<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Emmanuel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Emmanuel</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <header class="page-hero">
    <div class="container">
      <p class="section-tag">All Articles</p>
      <h1 class="page-hero-title">The Blog</h1>
    </div>
  </header>

  <section class="section" style="padding-top:40px;">
    <div class="container">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search articles..." />
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-cat="all">All</button>
        <!-- Categories populated dynamically -->
      </div>
      <div class="blog-grid" id="blogGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
      <div id="emptyState" style="display:none;text-align:center;padding:60px 0;color:var(--text-secondary);">
        <p style="font-size:1.1rem;">No articles found.</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <span class="footer-logo">Emmanuel</span>
        <p>Premium thoughts, beautifully written.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
    <div class="footer-bottom container">
      <p>&copy; <span id="year"></span> Emmanuel. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/particles.js"></script>
  <script type="module" src="js/blog.js"></script>
</body>
</html>
