<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Emmanuel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">Emmanuel</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <span class="sidebar-link-icon">⊞</span> Dashboard
        </a>
        <a href="posts.html" class="sidebar-link">
          <span class="sidebar-link-icon">✎</span> All Posts
        </a>
        <a href="editor.html" class="sidebar-link">
          <span class="sidebar-link-icon">＋</span> New Post
        </a>
        <a href="messages.html" class="sidebar-link active">
          <span class="sidebar-link-icon">✉</span> Messages
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="../index.html" class="sidebar-link">
          <span class="sidebar-link-icon">↗</span> View Site
        </a>
        <a href="#" class="sidebar-link" id="logoutBtn">
          <span class="sidebar-link-icon">⏻</span> Logout
        </a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Messages</h1>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>From</th>
              <th>Email</th>
              <th>Subject</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="messagesBody">
            <tr><td colspan="5" style="color:var(--text-secondary);text-align:center;padding:40px;">Loading messages...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Message Detail Modal -->
      <div id="msgModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:40px;max-width:560px;width:90%;position:relative;">
          <button onclick="closeMsgModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;">✕</button>
          <div id="msgModalContent"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin-messages.js"></script>
  <script>
    function closeMsgModal() {
      document.getElementById('msgModal').style.display = 'none';
    }
  </script>
</body>
</html>
