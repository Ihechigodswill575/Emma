<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Emmanuel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-logo">Emmanuel</div>
      <p class="admin-login-sub">Admin Panel — Sign In</p>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="loginBtn" style="opacity:1;animation:none;width:100%;justify-content:center;margin-top:8px;">
        Sign In
      </button>

      <div style="text-align:center;margin-top:16px;">
        <a id="forgotPasswordLink" href="#" style="font-size:0.8rem;color:var(--text-secondary);">Forgot password?</a>
      </div>

      <div class="form-message" id="loginMessage"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/particles.js"></script>
  <script type="module" src="../js/admin-auth.js"></script>
</body>
</html>
